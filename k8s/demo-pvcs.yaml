apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: demo-data-pvc
  namespace: k8s136-demo
  labels:
    app: demo-app
    component: data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: demo-logs-pvc
  namespace: k8s136-demo
  labels:
    app: demo-app
    component: logs
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: standard
