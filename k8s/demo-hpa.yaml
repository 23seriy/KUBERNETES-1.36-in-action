# HPA Scale to Zero (Alpha) — requires HPAScaleToZero feature gate.
# This manifest uses minReplicas: 1 so it deploys on any cluster.
# To test scale-to-zero, start Minikube with:
#   minikube start --feature-gates=HPAScaleToZero=true
# Then change minReplicas to 0 AND use an Object/External metric
# (Resource metrics alone cannot drive scale-to-zero).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-app-hpa
  namespace: k8s136-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-app
  minReplicas: 1   # Change to 0 when HPAScaleToZero feature gate is enabled
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
  # Uncomment the Object metric below when testing scale-to-zero.
  # At least one Object or External metric is required for minReplicas: 0.
  # - type: Object
  #   object:
  #     metric:
  #       name: requests-per-second
  #     describedObject:
  #       apiVersion: networking.k8s.io/v1
  #       kind: Ingress
  #       name: demo-app-ingress
  #     target:
  #       type: Value
  #       value: 10
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
