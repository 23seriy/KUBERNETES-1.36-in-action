apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: k8s136-demo
  labels:
    app: demo-app
spec:
  replicas: 1  # RWO PVCs can only be mounted by one pod at a time
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      # WAS v1alpha2: link pods to the runtime PodGroup (requires feature gate)
      # schedulingGroup:
      #   podGroupName: demo-app-podgroup
      # User Namespaces (GA) — demonstrated separately in user-namespaces-pod.yaml
      # Uncomment below on runtimes that support it (containerd 2.x + kernel 5.12+):
      # hostUsers: false
      serviceAccountName: demo-monitoring-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 101         # nginx-unprivileged image runs as UID 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web-server
          # nginx-unprivileged listens on 8080 and runs as a non-root user,
          # satisfying the PSS `restricted` profile out of the box.
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data-volume
              mountPath: /usr/share/nginx/html/data
            - name: logs-volume
              mountPath: /var/log/nginx
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
        - name: log-processor
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              echo "Log processor started at $(date)"
              while true; do
                echo "Processing logs at $(date)" >> /logs/processor.log
                sleep 30
              done
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: logs-volume
              mountPath: /logs
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: demo-data-pvc
        - name: logs-volume
          persistentVolumeClaim:
            claimName: demo-logs-pvc
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
