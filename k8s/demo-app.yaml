apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: k8s136-demo
  labels:
    app: demo-app
spec:
  replicas: 1  # RWO PVCs can only be mounted by one pod at a time
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      # WAS v1alpha2: link pods to the runtime PodGroup (requires feature gate)
      # schedulingGroup:
      #   podGroupName: demo-app-podgroup
      # User Namespaces (GA) — demonstrated separately in user-namespaces-pod.yaml
      # Uncomment below on runtimes that support it (containerd 2.x + kernel 5.12+):
      # hostUsers: false
      serviceAccountName: demo-monitoring-sa
      containers:
      - name: web-server
        image: nginx:1.25
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        volumeMounts:
        - name: data-volume
          mountPath: /usr/share/nginx/html/data
        - name: logs-volume
          mountPath: /var/log/nginx
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
      - name: log-processor
        image: alpine:3.18
        command:
        - /bin/sh
        - -c
        - |
          echo "Log processor started at $(date)"
          while true; do
            echo "Processing logs at $(date)" >> /logs/processor.log
            sleep 30
          done
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: logs-volume
          mountPath: /logs
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: demo-data-pvc
      - name: logs-volume
        persistentVolumeClaim:
          claimName: demo-logs-pvc
