# Volume Group Snapshots (Stable in 1.36) — crash-consistent multi-PVC snapshots
# Note: v1beta1 API now returns a deprecation warning. Use v1.
apiVersion: groupsnapshot.storage.k8s.io/v1
kind: VolumeGroupSnapshotClass
metadata:
  name: demo-group-snapclass
driver: hostpath.csi.k8s.io
deletionPolicy: Delete
parameters:
  compression: "true"
---
apiVersion: groupsnapshot.storage.k8s.io/v1
kind: VolumeGroupSnapshot
metadata:
  name: demo-app-group-snapshot
  namespace: k8s136-demo
spec:
  volumeGroupSnapshotClassName: demo-group-snapclass
  source:
    selector:
      matchLabels:
        app: demo-app
