# ImageVolume / OCI Artifacts (GA in 1.36) — mount OCI images as volumes
# No init containers, no sidecar pattern, no build-time bloat
# Note: Requires ImageVolume feature gate. On Minikube:
#   minikube start --feature-gates=ImageVolume=true
apiVersion: v1
kind: Pod
metadata:
  name: image-volume-demo
  namespace: k8s136-demo
  labels:
    demo: image-volume
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - |
          echo "=== ImageVolume Demo ==="
          echo "Contents mounted from OCI artifact:"
          ls -la /oci-data/
          echo ""
          echo "This data came from an OCI image, mounted read-only as a volume."
          echo "No init container. No sidecar. Just a volume reference."
          echo ""
          echo "Attempting write (should fail — read-only mount):"
          touch /oci-data/test 2>&1 || echo "Write denied as expected."
          sleep 3600
      volumeMounts:
        - name: oci-content
          mountPath: /oci-data
      resources:
        requests:
          memory: "32Mi"
          cpu: "10m"
        limits:
          memory: "64Mi"
          cpu: "50m"
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
  volumes:
    - name: oci-content
      image:
        reference: busybox:1.36
        pullPolicy: IfNotPresent
