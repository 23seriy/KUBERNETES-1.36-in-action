apiVersion: v1
kind: Service
metadata:
  name: demo-app-service
  namespace: k8s136-demo
  labels:
    app: demo-app
spec:
  selector:
    app: demo-app
  ports:
    - name: http
      port: 80         # external service port (unchanged for port-forward UX)
      targetPort: 8080 # nginx-unprivileged listens on 8080
  type: ClusterIP
